<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>AgriMateKE — Smart Farming Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g50:#f0faf0;--g100:#d4f0d4;--g200:#a8e0a8;--g300:#6dca6d;
  --g400:#4caf50;--g500:#3d9142;--g600:#2e7d32;--g700:#1e5c22;--g800:#1b5e20;
  --amber-100:#fff8e1;--amber-400:#ffca28;--amber-600:#f57f17;
  --red-100:#ffebee;--red-400:#ef5350;--red-600:#c62828;
  --sky-100:#e1f5fe;--sky-400:#29b6f6;--sky-600:#0277bd;
  --purple-100:#f3e5f5;--purple-400:#ab47bc;--purple-600:#7b1fa2;
  --gray-50:#fafafa;--gray-100:#f5f5f5;--gray-200:#eeeeee;
  --gray-300:#e0e0e0;--gray-400:#bdbdbd;--gray-500:#9e9e9e;
  --gray-600:#757575;--gray-700:#616161;--gray-800:#424242;--gray-900:#212121;
  --white:#ffffff;
  --font-head:'DM Serif Display',serif;
  --font:'Outfit',sans-serif;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;--r-full:999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
html,body,#root{height:100%;font-family:var(--font);background:var(--gray-50);color:var(--gray-900);-webkit-font-smoothing:antialiased}

/* ══ LAYOUT ══════════════════════════════════════════ */
.app-shell{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:245px;background:linear-gradient(180deg,var(--g800) 0%,var(--g700) 100%);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s ease;z-index:50}
.sidebar-logo{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo h1{font-family:var(--font-head);font-size:22px;color:var(--white);letter-spacing:.3px}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.sidebar-logo .farm-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:rgba(255,255,255,.1);border-radius:var(--r-full);padding:3px 10px;font-size:11px;color:rgba(255,255,255,.75)}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sidebar-nav::-webkit-scrollbar{display:none}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);padding:12px 12px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;color:rgba(255,255,255,.65);font-size:14px;font-weight:400;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:rgba(255,255,255,.08);color:var(--white)}
.nav-item.active{background:rgba(255,255,255,.15);color:var(--white);font-weight:600}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red-400);color:var(--white);font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r-full)}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 12px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--g400);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow-sm)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:17px;font-weight:600;color:var(--gray-900)}
.topbar-sub{font-size:11px;color:var(--gray-500);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px}

/* ══ CARDS ══════════════════════════════════════════ */
.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)}
.metric-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:16px 20px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.metric-card:hover{box-shadow:var(--shadow-md)}
.metric-label{font-size:11px;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.metric-value{font-size:24px;font-weight:700;color:var(--gray-900);line-height:1}
.metric-sub{font-size:11px;color:var(--gray-500);margin-top:5px;display:flex;align-items:center;gap:4px}
.metric-positive{color:var(--g600)}
.metric-negative{color:var(--red-400)}
.metric-icon{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-bottom:10px}

/* ══ GRIDS ══════════════════════════════════════════ */
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}

/* ══ SECTION ══════════════════════════════════════════ */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:16px;font-weight:600;color:var(--gray-900)}
.section-sub{font-size:12px;color:var(--gray-500);margin-top:2px}

/* ══ BUTTONS ══════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--g600);color:var(--white)}
.btn-primary:hover{background:var(--g800);transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,125,50,.3)}
.btn-outline{background:transparent;color:var(--gray-700);border:1px solid var(--gray-300)}
.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--g600);border:none;padding:6px 10px}
.btn-ghost:hover{background:var(--g50)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-danger{background:var(--red-100);color:var(--red-600);border:1px solid #ffcdd2}
.btn-icon{padding:8px;border-radius:var(--r-sm);background:transparent;border:1px solid var(--gray-200);cursor:pointer;display:flex;align-items:center;color:var(--gray-600);transition:all .15s}
.btn-icon:hover{background:var(--gray-100)}

/* ══ FORMS ══════════════════════════════════════════ */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--gray-700)}
.form-input{padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:var(--font);font-size:14px;color:var(--gray-900);outline:none;transition:border .15s;background:var(--white)}
.form-input:focus{border-color:var(--g400);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.form-select{padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-family:var(--font);font-size:14px;color:var(--gray-900);outline:none;background:var(--white);cursor:pointer;width:100%}
.form-select:focus{border-color:var(--g400)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--gray-500);margin-top:2px}

/* ══ MODAL ══════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:var(--r-xl);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
.modal::-webkit-scrollbar{display:none}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:18px;font-weight:700;color:var(--gray-900)}
.modal-icon{width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--g50);margin-bottom:4px}

/* ══ BADGES ══════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:600}
.badge-green{background:var(--g50);color:var(--g700)}
.badge-amber{background:var(--amber-100);color:var(--amber-600)}
.badge-red{background:var(--red-100);color:var(--red-600)}
.badge-sky{background:var(--sky-100);color:var(--sky-600)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-purple{background:var(--purple-100);color:var(--purple-600)}

/* ══ TABLE ══════════════════════════════════════════ */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--gray-200)}
td{font-size:13px;color:var(--gray-800);padding:12px 14px;border-bottom:1px solid var(--gray-100)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* ══ PROGRESS ══════════════════════════════════════════ */
.progress-bar{height:6px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--g400);border-radius:4px;transition:width .5s ease}
.progress-fill.amber{background:var(--amber-400)}
.progress-fill.red{background:var(--red-400)}

/* ══ AUTH ══════════════════════════════════════════ */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--g800) 0%,var(--g600) 55%,#66bb6a 100%);padding:16px}
.auth-card{background:var(--white);border-radius:var(--r-xl);padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{font-family:var(--font-head);font-size:30px;color:var(--g800)}
.auth-logo p{font-size:13px;color:var(--gray-500);margin-top:6px;line-height:1.5;max-width:300px;margin-inline:auto}
.auth-tabs{display:flex;gap:0;background:var(--gray-100);border-radius:var(--r-sm);padding:4px;margin-bottom:22px}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;color:var(--gray-500);transition:all .15s}
.auth-tab.active{background:var(--white);color:var(--g800);box-shadow:var(--shadow-sm)}

/* ══ CROP CARD ══════════════════════════════════════════ */
.crop-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:16px;position:relative;overflow:hidden;transition:box-shadow .2s;cursor:default}
.crop-card:hover{box-shadow:var(--shadow-md)}
.crop-card-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.crop-name{font-size:15px;font-weight:600;color:var(--gray-900)}
.crop-detail{font-size:12px;color:var(--gray-500);margin-top:2px}

/* ══ TASK ══════════════════════════════════════════ */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--gray-200);margin-bottom:8px;transition:background .1s;background:var(--white)}
.task-item:hover{background:var(--gray-50)}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--gray-300);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.task-check.done{background:var(--g400);border-color:var(--g400)}
.task-title{font-size:13px;font-weight:600;color:var(--gray-800)}
.task-title.done{text-decoration:line-through;color:var(--gray-400);font-weight:400}
.task-due{font-size:11px;color:var(--gray-500);margin-top:3px}

/* ══ CHAT / SHAMBA BOT ══════════════════════════════════ */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 58px - 48px);max-height:700px}
.chat-header{background:linear-gradient(135deg,var(--g800),var(--g600));padding:16px 20px;border-radius:var(--r-lg) var(--r-lg) 0 0;display:flex;align-items:center;gap:12px;flex-shrink:0}
.bot-orb{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:22px;animation:pulse 2.5s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.2)}50%{box-shadow:0 0 0 8px rgba(255,255,255,.0)}}
.chat-body{flex:1;overflow-y:auto;padding:16px;background:var(--gray-50);display:flex;flex-direction:column;gap:12px}
.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:3px}
.chat-msg{display:flex;gap:8px;align-items:flex-end;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.bot{align-self:flex-start;max-width:80%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:80%}
.chat-avatar{width:28px;height:28px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1.5px solid var(--g200)}
.chat-bubble{padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.55;font-weight:400}
.chat-msg.bot .chat-bubble{background:var(--white);color:var(--gray-900);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.chat-msg.user .chat-bubble{background:var(--g600);color:var(--white);border-bottom-right-radius:4px}
.chat-suggestions{padding:10px 16px;display:flex;gap:6px;overflow-x:auto;background:var(--white);border-top:1px solid var(--gray-100);flex-shrink:0}
.chat-suggestions::-webkit-scrollbar{display:none}
.chip{background:var(--g50);color:var(--g700);border:1px solid var(--g200);border-radius:var(--r-full);padding:6px 14px;font-family:var(--font);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.chip:hover{background:var(--g100);border-color:var(--g300)}
.chat-input-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--white);border-top:1px solid var(--gray-200);border-radius:0 0 var(--r-lg) var(--r-lg);flex-shrink:0}
.chat-input{flex:1;background:var(--gray-100);border:1.5px solid transparent;border-radius:var(--r-full);padding:10px 16px;font-family:var(--font);font-size:14px;color:var(--gray-900);outline:none;transition:border .15s}
.chat-input:focus{border-color:var(--g300);background:var(--white)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--g600);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--white);flex-shrink:0;transition:background .15s}
.chat-send:hover{background:var(--g800)}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;background:var(--white);border-radius:18px;border-bottom-left-radius:4px;width:fit-content;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--gray-400);animation:typeBlink 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typeBlink{0%,80%,100%{opacity:.25}40%{opacity:1}}

/* ══ VET DIRECTORY ══════════════════════════════════════ */
.vet-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:box-shadow .2s}
.vet-card:hover{box-shadow:var(--shadow-md)}
.vet-avatar{width:52px;height:52px;border-radius:50%;background:var(--g50);border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.vet-name{font-size:14px;font-weight:700;color:var(--gray-900)}
.vet-spec{font-size:12px;color:var(--gray-500);margin-top:2px}
.vet-county{font-size:11px;color:var(--gray-400);margin-top:2px}
.vet-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-full);margin-top:4px}
.vet-status.available{background:#dcfce7;color:#15803d}
.vet-status.busy{background:var(--amber-100);color:var(--amber-600)}
.vet-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.vet-actions{display:flex;gap:6px;margin-left:auto;flex-direction:column}
.vet-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:transform .15s}
.vet-btn:active{transform:scale(.9)}
.vet-btn-call{background:var(--g50)}
.vet-btn-msg{background:var(--g600);color:var(--white)}

/* ══ ADS ══════════════════════════════════════════ */
.ad-card{border-radius:var(--r-md);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:1px solid transparent}
.ad-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ad-sponsored{position:absolute;top:6px;right:8px;font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em}
.ad-logo{width:52px;height:52px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ad-title{font-size:15px;font-weight:700}
.ad-sub{font-size:12px;opacity:.75;margin-top:2px}
.ad-cta{font-size:12px;font-weight:700;margin-top:6px;display:inline-flex;align-items:center;gap:4px}

/* ══ GRANTS ══════════════════════════════════════════ */
.grant-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-md);padding:16px;margin-bottom:10px;border-left:4px solid var(--g400)}
.grant-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:var(--r-full);display:inline-block;margin-bottom:6px}
.grant-title{font-size:14px;font-weight:700;color:var(--gray-900)}
.grant-body{font-size:12px;color:var(--gray-600);margin-top:5px;line-height:1.6}
.grant-deadline{font-size:11px;font-weight:700;color:var(--amber-600);margin-top:8px;display:flex;align-items:center;gap:4px}

/* ══ PRO UPGRADE ══════════════════════════════════════ */
.pro-card{background:linear-gradient(135deg,var(--g800),var(--g600));border-radius:var(--r-lg);padding:24px;color:var(--white);position:relative;overflow:hidden}
.pro-card::before{content:'⭐';position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.08;line-height:1}
.pro-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.85);margin-top:10px}
.plan-option{border:2px solid var(--gray-200);border-radius:var(--r-md);padding:14px 16px;cursor:pointer;transition:border .15s;margin-bottom:8px}
.plan-option.selected{border-color:var(--g400);background:var(--g50)}
.plan-option:hover{border-color:var(--g300)}

/* ══ WEATHER ══════════════════════════════════════════ */
.weather-card{background:linear-gradient(135deg,#1565c0,#1976d2,#42a5f5);border-radius:var(--r-lg);padding:20px 24px;color:var(--white);position:relative;overflow:hidden}
.weather-card::after{content:'';position:absolute;right:-30px;bottom:-30px;width:150px;height:150px;background:rgba(255,255,255,.06);border-radius:50%}
.weather-temp{font-size:52px;font-weight:300;line-height:1;font-family:var(--font-head)}
.forecast-day{text-align:center;background:rgba(255,255,255,.1);border-radius:var(--r-sm);padding:8px 6px;flex:1}

/* ══ NOTIFICATION BELL ══════════════════════════════ */

function render(){
  const root=document.getElementById('root')
  if(!AUTH){root.innerHTML=renderAuth();return}
  root.innerHTML=renderShell()
  afterRender()
}

function renderShell(){
  return `
  <div class="app-shell">
    ${renderSidebar()}
    ${SIDEBAR_OPEN?`<div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49" onclick="SIDEBAR_OPEN=false;render()"></div>`:''}
    <div class="main">
      ${renderTopbar()}
      <div class="content fade-in" id="main-content">
        ${renderPage()}
      </div>
    </div>
  </div>
  ${MODAL?renderModal():''}`
}

const BOT_REPLIES={
  weather:['🌦️ Current: 28°C, Sunny in your area. Rain expected Friday–Saturday. Hold off on spraying before the rain — apply your fungicide by Thursday. Good planting window today and tomorrow.','☀️ Clear and warm today — great for harvesting and drying. Long rains continue through May. Your maize harvest timing looks ideal this week.'],
  pest:['🐛 For tomato blight (current risk is HIGH due to humidity): Remove affected leaves, apply Ridomil or Dithane M45, spray in the morning. Repeat every 7 days. Avoid wetting leaves when irrigating.','🌿 Top pests this season: Aphids on beans (neem oil or Dimethoate), Fall Armyworm on maize (Cypermethrin), Blight on tomatoes (copper fungicide). Which crop do you need help with?'],
  profit:['📊 Farm summary this month:\n• Revenue: KSh 35,000\n• Expenses: KSh 21,100\n• Net Profit: KSh 13,900 ✅\n\nBest margin: Eggs from layers (~68%). Your dairy is your second best. Maize will add significant revenue at harvest.','💰 Your most profitable activity right now is egg production at ~68% margin. Consider expanding your layer flock from 120 to 200 birds — estimated ROI within 4 months.'],
  market:['💹 Best prices right now:\n• Tomatoes: KSh 6,200/crate (Nairobi) — 18% above average 📈\n• Maize: KSh 3,800/90kg — good time to sell\n• Eggs: KSh 14/egg steady\n\nBest market: Wakulima, Nairobi — go before 9am.','🛒 Market tip: Kales prices dropped 5% this week due to oversupply. Hold if possible, or redirect to hotels/restaurants for better rates. Tomatoes remain strong.'],
  crops:['🌾 Your maize is at 95% — ready to harvest. Optimal window: May 5–10 before the rains. Arrange transport now. Your kales are in fruiting stage — market in 1–2 weeks. Beans are seedlings, no action needed yet.','🍅 Tomato care at flowering stage: Ensure consistent watering, apply CAN fertilizer, watch for blight. Your harvest window is ~June 10 — prices should still be good.'],
  vet:['🏥 For livestock health queries, I recommend contacting Dr. Mary Mwangi (Livestock Specialist, Nairobi) or Dr. Paul Kamau (Kiambu). Both are currently available. Go to the Vet Directory to contact them directly.','💊 Common livestock issues this season: Respiratory infections in broilers (high humidity), reduced milk in dairy (check feed quality and water access), Newcastle in layers (vaccine due — check your task list!).'],
  default:['🌾 Hello! I\'m Shamba Bot, your AI farming companion. I can help you with:\n• Crop advice and disease treatment\n• Market prices and when to sell\n• Profit analysis and farm planning\n• Weather alerts and farming calendar\n• Livestock health tips\n\nWhat would you like to know?','👨‍🌾 Great question! Ask me about your crops, livestock, market prices, weather, or farm finances. I\'m trained on Kenyan farming data and updated weekly.'],
}
function getBotReply(msg){
  const m=msg.toLowerCase()
  if(m.includes('weather')||m.includes('rain')||m.includes('hali'))return BOT_REPLIES.weather[Math.random()>.5?1:0]
  if(m.includes('pest')||m.includes('disease')||m.includes('blight')||m.includes('sick'))return BOT_REPLIES.pest[Math.random()>.5?1:0]
  if(m.includes('profit')||m.includes('money')||m.includes('earn')||m.includes('revenue'))return BOT_REPLIES.profit[Math.random()>.5?1:0]
  if(m.includes('price')||m.includes('market')||m.includes('sell')||m.includes('bei'))return BOT_REPLIES.market[Math.random()>.5?1:0]
  if(m.includes('crop')||m.includes('maize')||m.includes('tomato')||m.includes('harvest'))return BOT_REPLIES.crops[Math.random()>.5?1:0]
  if(m.includes('vet')||m.includes('cow')||m.includes('chicken')||m.includes('milk')||m.includes('egg'))return BOT_REPLIES.vet[Math.random()>.5?1:0]
  return BOT_REPLIES.default[Math.random()>.5?1:0]
}

function sendChat(){const el=document.getElementById('chat-in');if(!el||!el.value.trim())return;sendBot(el.value.trim());el.value=''}
function sendBot(msg){
  CHAT_MSGS.push({role:'user',text:msg})
  CHAT_TYPING=true;render();scrollChat()
  setTimeout(()=>{CHAT_TYPING=false;CHAT_MSGS.push({role:'bot',text:getBotReply(msg)});render();scrollChat()},1200+Math.random()*600)
}
function scrollChat(){setTimeout(()=>{const b=document.getElementById('chat-body');if(b)b.scrollTop=b.scrollHeight},80)}

function modalWrap(title,icon,body){
  return `
<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div>
        ${icon?`<div class="modal-icon">${icon}</div>`:''}
        <div class="modal-title">${title}</div>
      </div>
      <button class="btn-icon" onclick="closeModal()">${ic('x',16)}</button>
    </div>
    ${body}
  </div>
</div>`
}

function renderModal(){
  const M={
    add_crop:()=>modalWrap('Add Crop','🌿',`

        <div class="form-group"><label class="form-label">Planted On</label><input class="form-input" type="date" id="c-planted"/></div>

        <div class="form-group"><label class="form-label">Unit Price (KSh)</label><input class="form-input" type="number" id="s-price" placeholder="0" oninput="calcSaleTotal()"/></div>

    add_expense:()=>modalWrap('Add Expense','📋',`
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="e-cat"><option value="feed">Animal Feed</option><option value="fertilizer">Fertilizer</option><option value="seeds">Seeds</option><option value="labour">Labour</option><option value="vet">Vet Services</option><option value="pesticide">Pesticides</option><option value="equipment">Equipment</option><option value="transport">Transport</option><option value="other">Other</option></select>

      <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="e-desc" placeholder="e.g. Layer mash - 10 bags"/></div>

        <div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="e-date" value="${today()}"/></div>

      <div class="flex gap-2 justify-between mt-2">
        <button class="btn btn-outline" onclick="closeModal()">${t('common.cancel')}</button>
        <button class="btn btn-primary" onclick="saveExpense()">${t('common.save')}</button>

    add_task:()=>modalWrap('Add Task','✅',`
      <div class="form-group"><label class="form-label">Task Title *</label><input class="form-input" id="tk-title" placeholder="e.g. Vaccinate layers, Apply fertilizer"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Due Date</label><input class="form-input" type="date" id="tk-due" value="${today()}"/></div>

      <div class="flex gap-2 justify-between mt-2">
        <button class="btn btn-outline" onclick="closeModal()">${t('common.cancel')}</button>
        <button class="btn btn-primary" onclick="saveTask()">${t('common.save')}</button>

    request_visit:()=>modalWrap('Request Farm Visit','🚜',`
      <div class="form-group"><label class="form-label">Select Vet</label>
        <select class="form-select" id="rv-vet">${DB.vets.map(v=>`<option value="${v.id}">${v.emoji} ${v.name} — ${v.spec}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Issue / Reason for Visit *</label><input class="form-input" id="rv-reason" placeholder="e.g. Sick chickens, Low milk production"/></div>
      <div class="form-row">

      <div class="flex gap-2 justify-between mt-2">
        <button class="btn btn-outline" onclick="closeModal()">${t('common.cancel')}</button>
        <button class="btn btn-primary" onclick="showToast('Visit request sent! Vet will contact you within 24hrs. 🐄');closeModal()">Send Request</button>
      </div>`),

    vet_register:()=>modalWrap('Apply to Join as Vet','🏥',`
      <div style="background:var(--g50);border:1px solid var(--g200);border-radius:var(--r-sm);padding:12px;margin-bottom:16px">
        <div style="font-size:12px;color:var(--g700);line-height:1.5">✅ Submit your credentials below. Our admin team reviews all applications within <strong>48 hours</strong>. Approved vets are listed publicly with their contact information.</div>

      </div>

      <div class="form-hint">💡 We will verify your KVB license before approval. Your profile will only go live after admin review.</div>
      <div class="flex gap-2 justify-between mt-3">
        <button class="btn btn-outline" onclick="closeModal()">${t('common.cancel')}</button>

      </div>`),
  }
  const fn=M[MODAL]
  return fn?fn():''
}

// ─────────────────────────────────────────────────
//  AUTH ACTIONS
// ─────────────────────────────────────────────────
function doLogin(){
  const email=document.getElementById('a-email')?.value.trim()
  const pass=document.getElementById('a-pass')?.value
  if(!email||!pass){showToast('Please fill in all fields','error');return}
  // In production: Supabase auth.signInWithPassword({email,password})
  DB.user={name:email.split('@')[0],county:'Nairobi',farm:`${email.split('@')[0]}'s Farm`,email,phone:'',plan:'free'}
  AUTH=true;PAGE='dashboard';render()
  showToast(`Welcome back! 👋`)
}

function doRegister(){
  const name=document.getElementById('r-name')?.value.trim()
  const county=document.getElementById('r-county')?.value.trim()
  const farm=document.getElementById('r-farm')?.value.trim()
  const phone=document.getElementById('r-phone')?.value.trim()
  const email=document.getElementById('r-email')?.value.trim()
  if(!name||!email){showToast('Name and email are required','error');return}
  // In production: Supabase auth.signUp + insert into profiles + farms
  DB.user={name,county:county||'Kenya',farm:farm||`${name}'s Farm`,email,phone:phone||'',plan:'free'}
  AUTH=true;PAGE='dashboard';render()
  showToast(`Welcome to AgriMateKE, ${name}! 🌱`)
}

function doDemo(){
  DB.user={name:'John Kipchoge',county:'Rongai',farm:"Kipchoge's Farm",email:'demo@agrimateke.ke',phone:'0700000000',plan:'free'}
  AUTH=true;PAGE='dashboard';render()
  showToast('Demo loaded — explore all features! 🌾')
}

// ─────────────────────────────────────────────────
//  DATA ACTIONS
// ─────────────────────────────────────────────────
function calcSaleTotal(){
  const q=parseFloat(document.getElementById('s-qty')?.value)||0
  const p=parseFloat(document.getElementById('s-price')?.value)||0
  const el=document.getElementById('s-total');if(el&&q&&p)el.value=q*p
}

function saveCrop(){
  const name=document.getElementById('c-name')?.value.trim()
  if(!name){showToast('Crop name is required','error');return}
  DB.crops.push({id:nid(),name,variety:document.getElementById('c-var')?.value||'',acres:parseFloat(document.getElementById('c-acres')?.value)||0,planted:document.getElementById('c-planted')?.value||'',harvest:document.getElementById('c-harvest')?.value||'',stage:document.getElementById('c-stage')?.value||'seedling',notes:document.getElementById('c-notes')?.value||''})
  DB.activity.unshift({icon:'🌿',text:`Added crop: ${name}`,time:'just now'})
  closeModal();showToast(`${name} added! 🌿`);navigate('crops')
}

function updateCropStage(id,stage){
  const c=DB.crops.find(x=>x.id===id);if(c){c.stage=stage;showToast('Stage updated! ✓');render()}
}

function deleteCrop(id){
  if(!confirm('Remove this crop?'))return
  const c=DB.crops.find(x=>x.id===id)
  DB.crops=DB.crops.filter(x=>x.id!==id);showToast(`${c?.name||'Crop'} removed`);render()
}

function saveLivestock(){
  const name=document.getElementById('l-name')?.value.trim()
  if(!name){showToast('Group name required','error');return}
  const emojiEl=document.getElementById('l-emoji')
  DB.livestock.push({id:nid(),emoji:emojiEl?.value||'🐔',name,type:document.getElementById('l-type')?.value||'Layers',count:parseInt(document.getElementById('l-count')?.value)||0,eggs:0,milk:0,notes:document.getElementById('l-notes')?.value||''})
  closeModal();showToast('Group added! 🐄');navigate('livestock')
}

function saveRecord(){
  const gid=parseInt(document.getElementById('r-grp')?.value)
  const g=DB.livestock.find(x=>x.id===gid);if(!g)return
  const type=document.getElementById('r-type')?.value
  const qty=parseFloat(document.getElementById('r-qty')?.value)||0
  if(type==='eggs')g.eggs=qty
  if(type==='milk')g.milk=qty
  DB.activity.unshift({icon:'📋',text:`Recorded ${type}: ${qty} — ${g.name}`,time:'just now'})
  closeModal();showToast('Production recorded! ✓');navigate('livestock')
}

function saveSale(){
  const item=document.getElementById('s-item')?.value.trim()
  const total=parseFloat(document.getElementById('s-total')?.value)||0
  if(!item||!total){showToast('Item and total are required','error');return}
  DB.sales.unshift({id:nid(),item,total,buyer:document.getElementById('s-buyer')?.value||'',date:today(),cat:'other'})
  DB.activity.unshift({icon:'💰',text:`Recorded sale: ${item} — ${fmt(total)}`,time:'just now'})
  closeModal();showToast('Sale recorded! 💰');navigate('sales')
}

function saveExpense(){
  const amt=parseFloat(document.getElementById('e-amt')?.value)
  if(!amt){showToast('Enter an amount','error');return}
  DB.expenses.unshift({id:nid(),desc:document.getElementById('e-desc')?.value||'Expense',cat:document.getElementById('e-cat')?.value,amount:amt,date:document.getElementById('e-date')?.value||today()})
  DB.activity.unshift({icon:'📋',text:`Added expense: ${document.getElementById('e-desc')?.value||'Expense'} — ${fmt(amt)}`,time:'just now'})
  closeModal();showToast('Expense recorded!');navigate('sales')
}

function saveTask(){
  const title=document.getElementById('tk-title')?.value.trim()
  if(!title){showToast('Task title required','error');return}
  DB.tasks.unshift({id:nid(),title,due:document.getElementById('tk-due')?.value||today(),priority:document.getElementById('tk-prio')?.value||'medium',done:false})
  closeModal();showToast('Task added! ✅')
  render()
}

function completeTask(id){
  const task=DB.tasks.find(x=>x.id===id)
  if(task&&!task.done){task.done=true;DB.activity.unshift({icon:'✅',text:`Completed: ${task.title}`,time:'just now'});showToast('Task completed! ✓');render()}
}

function deleteTask(id){
  DB.tasks=DB.tasks.filter(x=>x.id!==id);showToast('Task removed');render()
}

function saveProfile(){
  const name=document.getElementById('s-name')?.value.trim()
  const county=document.getElementById('s-county')?.value.trim()
  const farm=document.getElementById('s-farm')?.value.trim()
  const phone=document.getElementById('s-phone')?.value.trim()
  const email=document.getElementById('s-email')?.value.trim()
  if(name)DB.user.name=name
  if(county)DB.user.county=county
  if(farm)DB.user.farm=farm
  if(phone)DB.user.phone=phone
  if(email)DB.user.email=email
  // In production: supabase.from('profiles').update({...}).eq('id',user.id)
  showToast('Profile saved! ✓');render()
}

function upgradePro(){
  showToast('Opening M-Pesa payment...')
  setTimeout(()=>{
    DB.user.plan='pro'
    showToast('🎉 Welcome to Mkulima Pro! All features unlocked.')
    render()
  },1600)
}

  scrollChat()
}

render()
</script>
